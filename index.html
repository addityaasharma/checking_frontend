<!doctype html>
<html lang="en">
  <head>
    <!-- Basic SEO -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (VERY IMPORTANT) -->
    <title>BOBO AI - Smart Chat, Automation & Productivity Platform</title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="BOBO AI is a powerful platform for smart conversations, automation, productivity tools, and AI-powered insights. Build, chat, and scale with BOBO."
    />

    <!-- Keywords (less important but still okay) -->
    <meta
      name="keywords"
      content="BOBO AI, AI chatbot, automation platform, productivity AI, smart assistant, BOBO app"
    />

    <!-- Author -->
    <meta name="author" content="BOBO AI" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (for social media sharing) -->
    <meta
      property="og:title"
      content="BOBO AI - Smart Chat & Automation Platform"
    />
    <meta
      property="og:description"
      content="Chat smarter, automate faster, and build powerful workflows with BOBO AI."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="https://yourdomain.com/preview.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BOBO AI" />
    <meta
      name="twitter:description"
      content="AI-powered chat, automation, and productivity tools."
    />
    <meta name="twitter:image" content="https://yourdomain.com/preview.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
  </head>

  <body>
    <!-- SEO fallback content -->
    <noscript>
      <h1>BOBO AI - Smart Chat & Automation Platform</h1>
      <p>
        BOBO AI helps you automate tasks, chat intelligently, and boost
        productivity with advanced AI tools.
      </p>
    </noscript>

    <div id="root"></div>

    <!-- Main React App -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
